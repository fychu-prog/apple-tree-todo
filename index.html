<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- PWA settings -->
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#4CAF50">
    <link rel="apple-touch-icon" href="./icon.svg">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <meta name="apple-mobile-web-app-title" content="蘋果待辦樹">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <title>蘋果待辦樹 - 舒適採收每一天</title>
    <meta name="description" content="一個充滿成就感的待辦事項網頁，讓你的任務像蘋果一樣在樹上成長，完成後收穫到籃子裡。">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
</head>
<body>
    <div class="app-container">
        <header>
            <h1>🍎 蘋果待辦樹</h1>
            <div class="input-group">
                <input type="text" id="todo-input" placeholder="想要完成什麼任務？" aria-label="待辦事項內容">
                <button id="add-btn" class="apple-add-btn">🍎</button>
            </div>
        </header>

        <div id="garden-wrapper" class="garden-wrapper">
            <div id="garden-scaler" class="garden-scaler">
                <div id="garden-transform" class="garden-transform">
                    <main class="garden-area" id="garden-main">
                    <!-- Physics overlay - falling apples render here -->
                    <div id="physics-world" class="physics-world"></div>

                    <div class="tree-container">
                <div class="tree-svg-wrapper">
                    <svg viewBox="-550 -750 1100 1100" xmlns="http://www.w3.org/2000/svg" class="main-tree">
                        <!-- Centered Strong Trunk - Much Shorter -->
                        <path d="M-30,350 L30,350 L20,-100 L-20,-100 Z" fill="#5D4037" />
                        <path d="M0,0 L-150,-200" stroke="#5D4037" stroke-width="16" fill="none" stroke-linecap="round"/>
                        <path d="M0,0 L150,-200" stroke="#5D4037" stroke-width="16" fill="none" stroke-linecap="round"/>
                        
                        <!-- Massive Foliage - Compactlush -->
                        <circle cx="0" cy="-250" r="320" fill="#4CAF50" />
                        <circle cx="-250" cy="-150" r="260" fill="#66BB6A" />
                        <circle cx="250" cy="-150" r="260" fill="#81C784" />
                        <circle cx="0" cy="-480" r="240" fill="#2E7D32" />
                        <circle cx="-300" cy="-430" r="200" fill="#388E3C" />
                        <circle cx="300" cy="-430" r="200" fill="#43A047" />
                    </svg>
                </div>
            </div>
            <div id="apples-on-tree" class="apples-layer"></div>

            <!-- Basket with layered design -->
            <div class="basket-outer" id="basket-outer">
            <!-- Metal wire basket - back layer (fills the inside) -->
            <div class="basket-layer basket-back">
                <svg viewBox="0 0 320 220" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="metalBg" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%" stop-color="#b0b8c1"/>
                            <stop offset="100%" stop-color="#6e7a86"/>
                        </linearGradient>
                    </defs>
                    <!-- Filled trapezoid body -->
                    <path d="M15,60 L305,60 L260,200 L60,200 Z" fill="none" opacity="0"/>
                </svg>
            </div>
            <div class="basket-stats">
                <span class="basket-label">已收穫 (<span id="count">0</span>) 顆</span>
                <button id="clear-basket" class="text-btn">清空所有紀錄</button>
            </div>
            </div>

            <!-- Metal wire basket - front layer extracted to sit OVER physical apples (z-index 30) -->
            <div class="basket-outer-front" id="basket-outer-front" style="pointer-events: none;">
                <svg viewBox="0 0 320 220" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="wireGrad" x1="0" y1="0" x2="1" y2="1">
                            <stop offset="0%" stop-color="#dde3ea"/>
                            <stop offset="50%" stop-color="#8a96a3"/>
                            <stop offset="100%" stop-color="#c5cdd6"/>
                        </linearGradient>
                    </defs>
                    <path d="M15,60 L305,60 L260,200 L60,200 Z" fill="none" stroke="url(#wireGrad)" stroke-width="3.5" stroke-linejoin="round"/>
                    <path d="M15,60 Q160,20 305,60" fill="none" stroke="#c5cdd6" stroke-width="5" stroke-linecap="round"/>
                    <path d="M25,58 Q160,22 295,58" fill="none" stroke="#eef1f4" stroke-width="1.5" opacity="0.7"/>
                    <line x1="57" y1="60" x2="85" y2="200" stroke="#9aa5b1" stroke-width="1.5"/>
                    <line x1="100" y1="60" x2="120" y2="200" stroke="#9aa5b1" stroke-width="1.5"/>
                    <line x1="145" y1="60" x2="155" y2="200" stroke="#9aa5b1" stroke-width="1.5"/>
                    <line x1="180" y1="60" x2="190" y2="200" stroke="#9aa5b1" stroke-width="1.5"/>
                    <line x1="225" y1="60" x2="225" y2="200" stroke="#9aa5b1" stroke-width="1.5"/>
                    <line x1="260" y1="60" x2="250" y2="200" stroke="#9aa5b1" stroke-width="1.5"/>
                    <line x1="28" y1="106" x2="292" y2="106" stroke="#9aa5b1" stroke-width="1.5"/>
                    <line x1="44" y1="153" x2="276" y2="153" stroke="#9aa5b1" stroke-width="1.5"/>
                </svg>
            </div>
        </main>
        </div>
        </div>
        <!-- Floating Bulletin Button -->
        <button id="floating-bulletin-btn" class="floating-btn" aria-label="查看收穫公告欄">
            <span class="btn-icon">📋</span>
            <span class="btn-badge" id="badge-count">0</span>
        </button>

        <footer>
            <p>© 2026 蘋果待辦樹</p>
        </footer>
    </div>

    <!-- Harvested List Modal (Notice Board style) -->
    <div id="harvest-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content notice-board">
            <div class="modal-header">
                <h2>📜 收穫布告欄</h2>
                <button id="close-modal-btn" class="icon-btn">✕</button>
            </div>
            <div id="harvested-apples-list" class="harvested-list-container">
                <ul id="done-list"></ul>
            </div>
            <div class="modal-footer">
                <button id="clear-basket" class="clear-round-btn" title="清空所有紀錄">🗑️</button>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker 註冊成功!', reg))
                    .catch(err => console.log('Service Worker 註冊失敗:', err));
            });
        }
    </script>
</body>
</html>
